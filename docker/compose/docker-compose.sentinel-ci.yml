# Minimal Redis Sentinel topology with host-published ports — TEST HARNESS for
# tests/integration/test_redis_sentinel_failover.py. Mirrors the production
# topology in docker-compose.redis-sentinel.yml (1 master + 2 replicas + 3 sentinels).
services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: >
      redis-server --appendonly yes
      --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis-replica-1:
    image: redis:7-alpine
    command: >
      redis-server --appendonly yes --replicaof redis-master 6379
      --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    command: >
      redis-server --appendonly yes --replicaof redis-master 6379
      --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-1: &sentinel
    image: redis:7-alpine
    container_name: sentinel-1
    command: >
      sh -c "MASTER_IP=$$(getent hosts redis-master | awk '{print $$1}') &&
             echo 'port 26379' > /tmp/s.conf &&
             echo \"sentinel monitor mymaster $$MASTER_IP 6379 2\" >> /tmp/s.conf &&
             echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}' >> /tmp/s.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/s.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> /tmp/s.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/s.conf &&
             echo 'requirepass ${REDIS_PASSWORD}' >> /tmp/s.conf &&
             redis-sentinel /tmp/s.conf"
    ports: ["26379:26379"]
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-2:
    <<: *sentinel
    container_name: sentinel-2
    ports: ["26380:26379"]

  sentinel-3:
    <<: *sentinel
    container_name: sentinel-3
    ports: ["26381:26379"]
