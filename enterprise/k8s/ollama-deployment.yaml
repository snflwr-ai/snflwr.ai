apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: snflwr-ai
  labels:
    app: ollama
spec:
  # One pod pins one GPU (nvidia.com/gpu: 1 below), so this is bounded by your
  # GPU-node count. Default 1 so a fresh deploy succeeds on a single-GPU cluster
  # (replicas: 3 would leave 2 pods Pending forever on one GPU). Scale up as you
  # add GPUs: kubectl scale deployment ollama --replicas=<num_gpu_nodes>.
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Node selector for GPU nodes
      nodeSelector:
        accelerator: nvidia-gpu
      containers:
      - name: ollama
        image: ollama/ollama:0.30.9  # pinned (matches deploy.sh); never :latest — non-reproducible deploys
        ports:
        - containerPort: 11434
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_NUM_PARALLEL
          value: "4"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "3"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1  # Request 1 GPU per pod
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: ollama-data
        emptyDir: {}  # Use persistent volume in production
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: snflwr-ai
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
  type: ClusterIP
  sessionAffinity: ClientIP  # Sticky sessions for model caching
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600  # 1 hour session affinity
# ---------------------------------------------------------------------------
# Scaling note — Ollama is GPU-bound, so it is deliberately NOT autoscaled on
# CPU/memory.
#
# A previous HorizontalPodAutoscaler here targeted CPU 70% / memory 80%. That is
# the WRONG signal for GPU inference: CPU and memory stay low while the GPU
# saturates and requests queue, so the HPA would never scale up under real load
# (and its minReplicas pinned that many GPUs at idle). It has been removed.
#
# Each pod pins one GPU (nvidia.com/gpu: 1), so scaling Ollama means adding GPU
# capacity — a manual/infra decision, not a CPU threshold:
#   kubectl scale deployment ollama --replicas=<num_gpu_nodes> -n snflwr-ai
#
# For responsive autoscaling, scale on real GPU utilization. That needs the
# NVIDIA DCGM exporter + Prometheus Adapter (NOT bundled in enterprise/
# monitoring/). Once those are deployed, an HPA like this works (maxReplicas
# must be <= the number of available GPUs):
#
#   apiVersion: autoscaling/v2
#   kind: HorizontalPodAutoscaler
#   metadata: { name: ollama-hpa, namespace: snflwr-ai }
#   spec:
#     scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ollama }
#     minReplicas: 1
#     maxReplicas: 10
#     metrics:
#     - type: Pods
#       pods:
#         metric: { name: DCGM_FI_DEV_GPU_UTIL }
#         target: { type: AverageValue, averageValue: "70" }
# ---------------------------------------------------------------------------
