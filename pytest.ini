[pytest]
markers =
    integration: marks tests as integration tests (require full stack with Redis/Ollama)
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage ratchet: raise this floor as tests are added. See CLAUDE.md for philosophy.
# Priority: COPPA consent flow, FERPA access controls, audit trail, encryption, safety pipeline
addopts = --cov=api --cov=core --cov=safety --cov=storage --cov-fail-under=85 --cov-report=term-missing:skip-covered -q
