# snflwr.ai - Production All-in-One Stack
# This packages everything needed to run snflwr.ai in production

services:
  # Nginx - SSL termination, reverse proxy, rate limiting
  nginx:
    image: nginx:1.27.4-alpine
    container_name: snflwr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../enterprise/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../enterprise/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - open-webui
      - snflwr-api
    restart: unless-stopped
    networks:
      - snflwr-net

  # Open WebUI - Frontend (pre-built image)
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.3
    container_name: snflwr-frontend
    volumes:
      - open-webui-data:/app/backend/data
      # Mount Snflwr middleware
      - ../../frontend/open-webui/backend/open_webui/middleware:/app/backend/custom_middleware:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      - DEFAULT_USER_ROLE=user
      - DEFAULT_MODELS=snflwr-ai:latest
      # Lock down student accounts — chat only, no advanced controls
      - USER_PERMISSIONS_CHAT_CONTROLS=false
      - USER_PERMISSIONS_CHAT_VALVES=false
      - USER_PERMISSIONS_CHAT_SYSTEM_PROMPT=false
      - USER_PERMISSIONS_CHAT_PARAMS=false
      - USER_PERMISSIONS_CHAT_FILE_UPLOAD=false
      - USER_PERMISSIONS_CHAT_DELETE=false
      - USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS=false
      - USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS=false
      - USER_PERMISSIONS_WORKSPACE_PROMPTS_ACCESS=false
      - USER_PERMISSIONS_WORKSPACE_TOOLS_ACCESS=false
      - USER_PERMISSIONS_FEATURES_WEB_SEARCH=true
      - USER_PERMISSIONS_FEATURES_IMAGE_GENERATION=false
      - USER_PERMISSIONS_FEATURES_CODE_INTERPRETER=true
      - USER_PERMISSIONS_FEATURES_NOTES=false
      - USER_PERMISSIONS_FEATURES_CHANNELS=false
      - USER_PERMISSIONS_FEATURES_API_KEYS=false
      - USER_PERMISSIONS_FEATURES_MEMORIES=false
      - USER_PERMISSIONS_CHAT_SHARE=false
      - USER_PERMISSIONS_CHAT_EXPORT=false
      - USER_PERMISSIONS_CHAT_MULTIPLE_MODELS=false
      - USER_PERMISSIONS_CHAT_TEMPORARY=false
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_EVALUATION_ARENA_MODELS=false
      - ENABLE_TITLE_GENERATION=true
      - ENABLE_FOLLOW_UP_GENERATION=true
      - ENABLE_TAGS_GENERATION=true
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      - SHOW_ADMIN_DETAILS=false
      # Point to Snflwr API for safety pipeline
      - SNFLWR_API_URL=http://snflwr-api:8000
    depends_on:
      - ollama
      - snflwr-api
    restart: unless-stopped
    networks:
      - snflwr-net
    # Don't expose directly - goes through Nginx
    expose:
      - 8080

  # Snflwr API - Your safety pipeline backend
  snflwr-api:
    image: snflwr-api:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: snflwr-api
    volumes:
      - snflwr-data:/app/data
      - snflwr-logs:/app/logs
    environment:
      - ENVIRONMENT=production
      - OLLAMA_BASE_URL=http://ollama:11434
      - DB_TYPE=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=snflwr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=snflwr_db
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-require}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENCRYPT_CONVERSATIONS=true
      - API_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - snflwr-net
    expose:
      - 8000
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ollama - AI inference engine with models baked in
  ollama:
    image: snflwr-ollama:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile.ollama
      args:
        CHAT_MODEL: ${CHAT_MODEL:?Set CHAT_MODEL in .env (e.g. qwen3.5:9b)}
        SAFETY_MODEL: ${SAFETY_MODEL:-llama-guard3:1b}
    container_name: snflwr-ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - snflwr-net
    expose:
      - 11434
    # For GPU acceleration, add: -f docker-compose.gpu.yml

  # PostgreSQL - Database for users, profiles, incidents
  postgres:
    image: postgres:16.8-alpine
    container_name: snflwr-db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../enterprise/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=snflwr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=snflwr_db
    restart: unless-stopped
    networks:
      - snflwr-net
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snflwr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caching and rate limiting
  redis:
    image: redis:7.4-alpine
    container_name: snflwr-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - snflwr-net
    expose:
      - 6379
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker - Background task processing
  celery-worker:
    image: snflwr-api:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: snflwr-celery-worker
    command: celery -A utils.celery_config worker --loglevel=info --concurrency=4 -Q default,email,ai,data,maintenance
    environment:
      - ENVIRONMENT=production
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=snflwr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=snflwr_db
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-require}
      - OLLAMA_BASE_URL=http://ollama:11434
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPT_CONVERSATIONS=true
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - snflwr-logs:/app/logs
    networks:
      - snflwr-net

  # Celery Beat - Scheduled task scheduler (cleanup, digests)
  celery-beat:
    image: snflwr-api:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: snflwr-celery-beat
    command: celery -A utils.celery_config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      - ENVIRONMENT=production
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_TYPE=postgresql
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=snflwr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=snflwr_db
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-require}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - snflwr-logs:/app/logs
    networks:
      - snflwr-net

volumes:
  open-webui-data:
    driver: local
  ollama-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  snflwr-data:
    driver: local
  snflwr-logs:
    driver: local
  nginx-cache:
    driver: local

networks:
  snflwr-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
