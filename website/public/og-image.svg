<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#111827"/>
  <!-- Decorative gradient accent -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>
  <!-- Sunflower icon (simple geometric) -->
  <g transform="translate(600,130)">
    <!-- Petals -->
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(0)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(45)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(90)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(135)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(180)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(225)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(270)"/>
    <ellipse cx="0" cy="-38" rx="10" ry="22" fill="#F59E0B" transform="rotate(315)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="22" fill="#92400E"/>
    <circle cx="0" cy="0" r="16" fill="#78350F"/>
  </g>
  <!-- Main title -->
  <text x="600" y="255" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" fill="#FFFFFF" letter-spacing="-2">snflwr.ai</text>
  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#F59E0B">Safe AI for K-12</text>
  <!-- Subtitle -->
  <text x="600" y="378" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#9CA3AF">Your child talks to AI. You control what it says back.</text>
  <!-- Bottom accent line -->
  <rect x="500" y="430" width="200" height="3" rx="2" fill="#F59E0B" opacity="0.5"/>
</svg>
