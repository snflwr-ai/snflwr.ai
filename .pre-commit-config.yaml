# Pre-commit hooks for snflwr.ai — catch the formatting/lint drift that has
# reddened CI, locally before commit. Install once with:  pre-commit install
#
# Covers the black + ruff CI gates (they run cleanly in pre-commit's isolated
# envs). mypy is intentionally NOT here: CI runs it in the full project venv
# (`mypy ... --ignore-missing-imports`), but pre-commit's isolated mypy env
# lacks the runtime deps (e.g. redis) and so reports import-untyped errors that
# CI does not — making it stricter than the real gate. mypy stays enforced in CI.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(api|core|safety|storage|utils)/

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        files: ^(api|core|safety|storage|utils)/
