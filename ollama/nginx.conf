# Nginx Load Balancer Configuration for Ollama Cluster
# Distributes AI inference requests across multiple Ollama instances

events {
    worker_connections 1024;
}

http {
    # Upstream Ollama cluster
    upstream ollama_cluster {
        # Load balancing method: least_conn (route to instance with fewest connections)
        # Alternatives: ip_hash (sticky sessions), round_robin (default)
        least_conn;

        # Ollama instances
        server ollama-1:11434 max_fails=3 fail_timeout=30s weight=1;
        server ollama-2:11434 max_fails=3 fail_timeout=30s weight=1;
        server ollama-3:11434 max_fails=3 fail_timeout=30s weight=1;

        # Health check
        # Requires nginx-plus or use custom health check module
        # check interval=3000 rise=2 fall=3 timeout=1000;
    }

    # Server configuration
    server {
        listen 11434;
        server_name ollama-lb;

        # Logging
        access_log /var/log/nginx/ollama_access.log;
        error_log /var/log/nginx/ollama_error.log warn;

        # Client settings
        client_max_body_size 100M;  # Allow large model uploads
        client_body_timeout 300s;
        client_header_timeout 60s;

        # Proxy settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;  # Long timeout for AI inference
        proxy_buffering off;  # Disable buffering for streaming

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Ollama API endpoints
        location / {
            proxy_pass http://ollama_cluster;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (for streaming)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;

            # CORS disabled - Ollama is only accessed internally via the Docker network
        }

        # Status endpoint (nginx stats)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
        }
    }
}
