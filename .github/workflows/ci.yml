name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "claude/*" ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Code Quality & Linting
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Check code formatting with Black
      run: |
        black --check --diff api/ core/ safety/ storage/ utils/

    - name: Run Pylint
      run: |
        pylint api/ core/ safety/ storage/ utils/ --output-format=colorized --fail-under=5.0

    - name: Run MyPy type checking
      run: |
        mypy api/ core/ safety/ storage/ utils/ --ignore-missing-imports --no-strict-optional || echo "::warning::Type checking issues found"

  # Job 2: Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run Safety check for vulnerable dependencies
      run: |
        pip install -r requirements.txt
        safety check --json
      continue-on-error: false

    - name: Run Bandit security linter
      run: |
        bandit -r api/ core/ safety/ storage/ utils/ -f json -o bandit-report.json --severity-level medium --confidence-level medium || true
        bandit -r api/ core/ safety/ storage/ utils/ --severity-level high --confidence-level high

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  # Job 3: Unit & Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements-dev.txt

    - name: Create data directories
      run: mkdir -p data/logs

    - name: Start Redis
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq redis-server
        redis-server --daemonize yes
        redis-cli ping | grep -q PONG && echo "Redis ready"

    - name: Run unit tests with coverage
      env:
        REDIS_ENABLED: 'true'
        REDIS_HOST: 'localhost'
        REDIS_PORT: '6379'
      run: |
        # pytest.ini defines the coverage ratchet (--cov-fail-under).
        # Add XML report for Codecov upload without overriding the floor.
        pytest tests/ \
          -m "not integration" \
          --cov-report=xml \
          -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-snflwr-ai
        fail_ci_if_error: false

  # Job 4: Configuration Validation
  config-validation:
    name: Validate Configuration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate configuration module loads
      run: |
        python -c "
        from config import system_config, safety_config
        info = system_config.get_info()
        assert info['application'] == 'snflwr.ai'
        assert info['db_type'] in ('sqlite', 'postgresql')
        retention = safety_config.get_retention_policy()
        assert retention['compliance']['framework'] == 'COPPA/FERPA'
        print('✅ Configuration module loads correctly')
        "

    - name: Verify production validator catches missing config
      run: |
        python -c "
        import os
        os.environ['ENVIRONMENT'] = 'production'
        os.environ['JWT_SECRET_KEY'] = 'test-secret-key-for-ci-validation'
        from config import system_config
        try:
            system_config.validate_production_security()
            print('❌ Validator should have raised for incomplete production config')
            exit(1)
        except RuntimeError:
            print('✅ Production validator correctly rejects incomplete config')
        "

    - name: Check for hardcoded secrets
      run: |
        echo "Checking for hardcoded secrets..."
        FAILED=0
        if grep -rn "sk-[a-zA-Z0-9]" --include="*.py" api/ core/ safety/ storage/ utils/; then
          echo "::error::Potential API keys found in source code"
          FAILED=1
        fi
        if grep -rn "password\s*=\s*['\"][^'\"]\{8,\}" --include="*.py" api/ core/ safety/ storage/ utils/ | grep -v "test_\|mock\|example\|placeholder\|CHANGE_ME\|<.*>"; then
          echo "::error::Potential hardcoded passwords found in source code"
          FAILED=1
        fi
        if [ "$FAILED" -eq 1 ]; then
          exit 1
        fi
        echo "No hardcoded secrets detected"

  # Job 5: Database Schema Validation
  database-validation:
    name: Database Schema Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directories
      run: mkdir -p data/logs

    - name: Initialize test database
      run: |
        python database/init_db.py
        echo "✅ Database initialization successful"

    - name: Validate database schema
      run: |
        python -c "
        from storage.database import db_manager

        # Check all required tables exist
        tables = db_manager.execute_read('SELECT name FROM sqlite_master WHERE type=\"table\"')
        table_names = [t['name'] for t in tables]

        required_tables = [
            'accounts', 'child_profiles', 'conversations',
            'messages', 'safety_incidents', 'parent_alerts',
            'usage_quotas', 'audit_log', 'auth_tokens'
        ]

        missing = [t for t in required_tables if t not in table_names]
        if missing:
            print(f'❌ Missing tables: {missing}')
            exit(1)

        print(f'✅ All {len(required_tables)} required tables exist')
        "

  # Job 6: Docker Build Test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Snflwr API Docker image
      run: |
        docker build -f docker/Dockerfile -t snflwr-api:test .

    - name: Test Docker image
      run: |
        docker run --rm snflwr-api:test python --version

  # Job 7: Safety Filter Tests
  safety-tests:
    name: Safety Filter Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Create data directories
      run: mkdir -p data/logs

    - name: Start Redis
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq redis-server
        redis-server --daemonize yes
        redis-cli ping | grep -q PONG && echo "Redis ready"

    - name: Run safety pipeline tests
      env:
        REDIS_ENABLED: 'true'
        REDIS_HOST: 'localhost'
        REDIS_PORT: '6379'
      run: |
        pytest tests/test_safety_pipeline.py tests/test_safety_monitor.py -v \
          --override-ini="addopts=" \
          --cov=safety --cov-report=term-missing:skip-covered

  # Job 8: Middleware Integration Tests (CRITICAL)
  middleware-tests:
    name: Middleware Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Create data directories
      run: mkdir -p data/logs

    - name: Start Redis
      run: |
        sudo apt-get update -qq && sudo apt-get install -y -qq redis-server
        redis-server --daemonize yes
        redis-cli ping | grep -q PONG && echo "Redis ready"

    - name: Run middleware integration tests
      env:
        REDIS_ENABLED: 'true'
        REDIS_HOST: 'localhost'
        REDIS_PORT: '6379'
      run: |
        pytest tests/test_middleware_integration.py -v -m "not integration" \
          --override-ini="addopts=" \
          --no-cov

    - name: Verify core safety claim
      run: |
        echo "✅ Middleware integration tests validate core safety claim:"
        echo "   - Open WebUI middleware routes to Snflwr API"
        echo "   - Safety pipeline cannot be bypassed"
        echo "   - Authentication is enforced"
        echo ""
        echo "⚠️  Full integration tests require running stack (Ollama + API)"
        echo "   Run with: pytest -m integration"

# Summary job that depends on all others
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [code-quality, security, test, config-validation, database-validation, docker-build, safety-tests, middleware-tests]
    if: always()

    steps:
    - name: Check CI status
      run: |
        echo "CI Pipeline Summary:"
        echo "===================="
        echo "Code Quality:        ${{ needs.code-quality.result }}"
        echo "Security Scan:       ${{ needs.security.result }}"
        echo "Tests:               ${{ needs.test.result }}"
        echo "Config Validation:   ${{ needs.config-validation.result }}"
        echo "Database Validation: ${{ needs.database-validation.result }}"
        echo "Docker Build:        ${{ needs.docker-build.result }}"
        echo "Safety Tests:        ${{ needs.safety-tests.result }}"
        echo "Middleware Tests:    ${{ needs.middleware-tests.result }}"

        FAILED=0
        for job in \
          "${{ needs.test.result }}" \
          "${{ needs.security.result }}" \
          "${{ needs.safety-tests.result }}" \
          "${{ needs.middleware-tests.result }}" \
          "${{ needs.config-validation.result }}" \
          "${{ needs.database-validation.result }}" \
          "${{ needs.docker-build.result }}" \
          "${{ needs.code-quality.result }}"; do
          if [[ "$job" != "success" ]]; then
            FAILED=1
          fi
        done

        if [[ "$FAILED" -eq 1 ]]; then
          echo "::error::One or more CI checks failed — see job details above"
          exit 1
        fi
        echo "All CI checks passed"
