# Nginx load balancer for Ollama cluster
# Routes /api/* requests across multiple Ollama instances

events {
    worker_connections 1024;
}

http {
    upstream ollama_cluster {
        # Round-robin across Ollama instances
        server ollama-1:11434;
        server ollama-2:11434;
        server ollama-3:11434;
    }

    server {
        listen 11434;

        location / {
            proxy_pass http://ollama_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Streaming support for /api/generate and /api/chat
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Health check endpoint
        location /api/tags {
            proxy_pass http://ollama_cluster;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
