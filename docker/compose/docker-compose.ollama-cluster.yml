# Ollama Load Balanced Cluster
# Multiple Ollama instances with Nginx load balancer
# Run with: docker-compose -f docker-compose.ollama-cluster.yml up -d

services:
  # Nginx Load Balancer for Ollama
  ollama-lb:
    image: nginx:alpine
    container_name: ollama-load-balancer
    restart: unless-stopped
    ports:
      - "11434:11434"  # Expose single endpoint
    volumes:
      - ./ollama/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama-1
      - ollama-2
      - ollama-3
    networks:
      - ollama-network
      - snflwr-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Ollama Instance 1 (Primary)
  ollama-1:
    image: snflwr-ollama:latest
    container_name: ollama-instance-1
    restart: unless-stopped
    ports:
      - "11435:11434"  # Expose individual port for debugging
    volumes:
      - ollama-1-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
    networks:
      - ollama-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']  # GPU 0
              capabilities: [gpu]

  # Ollama Instance 2 (Secondary)
  ollama-2:
    image: snflwr-ollama:latest
    container_name: ollama-instance-2
    restart: unless-stopped
    ports:
      - "11436:11434"
    volumes:
      - ollama-2-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
    networks:
      - ollama-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']  # GPU 1 (if available)
              capabilities: [gpu]

  # Ollama Instance 3 (Tertiary)
  ollama-3:
    image: snflwr-ollama:latest
    container_name: ollama-instance-3
    restart: unless-stopped
    ports:
      - "11437:11434"
    volumes:
      - ollama-3-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
    networks:
      - ollama-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']  # GPU 2 (if available)
              capabilities: [gpu]

volumes:
  ollama-1-data:
    driver: local
  ollama-2-data:
    driver: local
  ollama-3-data:
    driver: local

networks:
  ollama-network:
    driver: bridge
  snflwr-net:
    external: true
