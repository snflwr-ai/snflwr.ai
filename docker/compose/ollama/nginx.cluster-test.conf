# Single-GPU fan-out test LB config. Same round-robin upstream as the production
# ollama-cluster nginx, plus: (1) an access log that records $upstream_addr so we
# can prove which replica served each request, and (2) explicit failover so a
# request that hits a downed replica is retried on the next one.
events { worker_connections 1024; }
http {
    log_format upstreamlog '$upstream_addr $status $request';
    access_log /var/log/nginx/access.log upstreamlog;

    upstream ollama_cluster {
        server ollama-1:11434 max_fails=1 fail_timeout=10s;
        server ollama-2:11434 max_fails=1 fail_timeout=10s;
    }

    server {
        listen 11434;

        location / {
            proxy_pass http://ollama_cluster;
            proxy_set_header Host $host;
            proxy_buffering off;                 # streaming /api/chat
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            # Active failover: if a replica is down/errors, retry the next one.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        location /api/tags {
            proxy_pass http://ollama_cluster;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
