# snflwr.ai — Default Nginx Configuration
#
# This config is suitable for Docker Compose development and simple deployments.
# For full production TLS setup with security headers, OCSP stapling, and
# rate limiting, use: enterprise/nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    # Hide Nginx version in response headers
    server_tokens off;

    # Strip backend server identity headers
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    upstream frontend {
        server open-webui:8080;
    }

    upstream api {
        server snflwr-api:8000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # HTTP → HTTPS redirect (disable only for local development without certs)
    server {
        listen 80;
        server_name _;

        # Redirect to HTTPS in production
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates — mount via Docker volume or configure paths
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        client_max_body_size 10M;

        # Frontend (Open WebUI)
        location / {
            limit_req zone=general_limit burst=20 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_read_timeout 86400;
        }

        # Authentication endpoints (strict rate limiting)
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Snflwr API endpoints
        location /api/snflwr/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint (no rate limiting)
        location /health {
            access_log off;
            proxy_pass http://api;
            proxy_http_version 1.1;
        }

        # Block dotfiles and backup files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
