# Docker Compose for Redis Sentinel (High Availability)
# Use this alongside docker-compose.yml for Redis HA
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.redis-sentinel.yml up -d
#
# This setup provides:
#   - 1 Redis master
#   - 2 Redis replicas
#   - 3 Sentinel nodes for automatic failover
#
# Requirements:
#   - Docker Compose v2+ (uses deploy.replicas for disabling standalone redis)
#
# Automatic failover occurs when:
#   - Master is unreachable for 5 seconds (configurable)
#   - 2 out of 3 Sentinel nodes agree on failover

services:
  # Disable the standalone redis from docker-compose.yml — the HA setup
  # uses redis-master instead.  We scale it to 0 so no container runs.
  redis:
    deploy:
      replicas: 0

  # Point snflwr-api to the sentinel-managed master (with password)
  snflwr-api:
    environment:
      - REDIS_HOST=redis-master
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy

  # Point celery worker to the sentinel-managed master (with password)
  celery-worker:
    environment:
      - REDIS_HOST=redis-master
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy

  # Point celery-beat to the sentinel-managed master (with password)
  celery-beat:
    environment:
      - REDIS_HOST=redis-master
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy

  # Redis Master
  redis-master:
    image: redis:7-alpine
    container_name: snflwr-redis-master
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis-master-data:/data
    networks:
      - snflwr-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Redis Replica 1
  redis-replica-1:
    image: redis:7-alpine
    container_name: snflwr-redis-replica-1
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --replicaof redis-master 6379
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis-replica1-data:/data
    networks:
      - snflwr-net
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Redis Replica 2
  redis-replica-2:
    image: redis:7-alpine
    container_name: snflwr-redis-replica-2
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --replicaof redis-master 6379
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
    volumes:
      - redis-replica2-data:/data
    networks:
      - snflwr-net
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Sentinel 1
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: snflwr-sentinel-1
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf &&
             echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}' >> /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 60000' >> /tmp/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf"
    networks:
      - snflwr-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    restart: unless-stopped

  # Sentinel 2
  redis-sentinel-2:
    image: redis:7-alpine
    container_name: snflwr-sentinel-2
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf &&
             echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}' >> /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 60000' >> /tmp/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf"
    networks:
      - snflwr-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    restart: unless-stopped

  # Sentinel 3
  redis-sentinel-3:
    image: redis:7-alpine
    container_name: snflwr-sentinel-3
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-master 6379 2' > /tmp/sentinel.conf &&
             echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}' >> /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 60000' >> /tmp/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf"
    networks:
      - snflwr-net
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    restart: unless-stopped

volumes:
  redis-master-data:
    driver: local
  redis-replica1-data:
    driver: local
  redis-replica2-data:
    driver: local

networks:
  snflwr-net:
    external: true
