[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
no_strict_optional = True

# Allow dynamic attributes (SystemConfig uses __getattr__)
disable_error_code = attr-defined

# Platform-specific imports
[mypy-ctypes.*]
ignore_errors = True

# Third-party libraries without stubs
[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-argon2.*]
ignore_missing_imports = True

[mypy-pynacl.*]
ignore_missing_imports = True

# Our modules - gradually typed
[mypy-core.*]
check_untyped_defs = False

[mypy-storage.*]
check_untyped_defs = False

[mypy-safety.*]
check_untyped_defs = False

[mypy-api.*]
check_untyped_defs = False

[mypy-utils.*]
check_untyped_defs = False
