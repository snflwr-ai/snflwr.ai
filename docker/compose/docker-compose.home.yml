# snflwr.ai - Home Server / Self-Hosted Stack
#
# Single-command deployment for home servers and personal VPS.
# No model baking, no PostgreSQL, no nginx. Just run:
#
#   ./deploy.sh                  (auto-detects GPU, generates secrets)
#
# Or manually:
#   docker compose -f docker/compose/docker-compose.home.yml up -d
#   docker compose -f docker/compose/docker-compose.home.yml \
#                  -f docker/compose/docker-compose.gpu.yml up -d   (with GPU)
#
# For enterprise deployments (school/district) with PostgreSQL, Redis,
# nginx, and SSL, see docker/compose/docker-compose.yml instead.

services:

  # Ollama - AI inference engine (models pulled on first start)
  ollama:
    # Pinned (was :latest, which could change under you and break model loading
    # or the /api/tags format the proxy depends on). The guarded upgrader
    # (./deploy.sh --upgrade ollama) bumps OLLAMA_IMAGE_TAG, smoke-tests it, and
    # rolls back on failure.
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-0.30.9}
    container_name: snflwr-ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - snflwr-home-net
    expose:
      - "11434"
    # GPU acceleration: add -f docker-compose.gpu.yml (handled automatically by deploy.sh)
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # snflwr.ai Safety API - FastAPI backend with content filtering
  snflwr-api:
    image: snflwr-api:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: snflwr-api
    volumes:
      - snflwr-home-data:/app/data
      - snflwr-home-logs:/app/logs
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # Ollama — snflwr-api proxies OWU requests to the real Ollama backend
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_PROXY_TARGET=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_MODEL:-snflwr.ai}
      # Hold-back streaming (better TTFT; ~+1 output-classifier call/turn). Safe
      # to enable on a GPU box with headroom; default off keeps the buffered path.
      - CHAT_STREAMING_ENABLED=${CHAT_STREAMING_ENABLED:-false}
      # Database - SQLite, no external dependency
      - DB_TYPE=sqlite
      - SNFLWR_DATA_DIR=/app/data
      - LOG_PATH=/app/logs
      # Redis disabled for home use (rate limiting falls back to in-memory)
      - REDIS_ENABLED=false
      # Security
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PARENT_DASHBOARD_PASSWORD=${PARENT_DASHBOARD_PASSWORD}
      - ENCRYPT_CONVERSATIONS=true
      # Database encryption at rest (AES-256 via SQLCipher). The image ships
      # sqlcipher3-binary; the key must persist (it's in .env.home) or
      # encrypted data becomes unrecoverable across restarts.
      - DB_ENCRYPTION_ENABLED=${DB_ENCRYPTION_ENABLED:-true}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      # API config
      - API_PORT=39150
      - API_HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # CORS - Open WebUI is on the same host
      - CORS_ORIGINS=http://localhost:${WEBUI_PORT:-3000},http://127.0.0.1:${WEBUI_PORT:-3000}
      # SMTP (optional - for parent alert emails)
      - SMTP_ENABLED=${SMTP_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - snflwr-home-net
    expose:
      - "39150"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:39150/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Open WebUI - Chat interface
  open-webui:
    # Pinned by default. The guarded upgrader (scripts/owui_upgrade.sh) bumps
    # OWU_IMAGE_TAG, smoke-tests the new version, and rolls this back to the
    # previous tag if the smoke test fails. v0.9.6 is the safety-reviewed pin.
    image: ghcr.io/open-webui/open-webui:${OWU_IMAGE_TAG:-v0.9.6}
    container_name: snflwr-frontend
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # OWU talks to snflwr-api's Ollama proxy — NOT directly to Ollama.
      # Safety pipeline is enforced at the proxy layer.
      - OLLAMA_BASE_URL=http://snflwr-api:39150
      # Bearer for the proxy. snflwr-api accepts INTERNAL_API_KEY as a
      # server-to-server credential; without this, every chat returns 401.
      # NOTE (2026-06-18): Open WebUI v0.8.12 does NOT read this env for Ollama
      # connections — its OLLAMA_API_CONFIGS PersistentConfig is hardcoded to a
      # {} default (config.py:1039) and only loads the key from webui.db. The
      # key is therefore seeded into the DB (ollama.api_configs."0".key) by
      # deploy.sh via scripts/owui_connect.py after the container boots. This
      # env is kept for documentation / forward-compat only; it has no effect
      # on the Ollama connection in this version.
      - OLLAMA_API_KEY=${INTERNAL_API_KEY}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      # Forward user identity headers so the proxy can identify students
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      # Self-signup stays off (students/parents don't self-register), but the
      # FIRST account still needs to be createable to bootstrap the admin. In
      # OWU v0.8.x that initial admin is gated behind ENABLE_INITIAL_ADMIN_SIGNUP
      # (env.py:460, default False) — without it the signup form 403s on a fresh
      # volume and there is no way in. Enable just the first-admin path.
      - ENABLE_INITIAL_ADMIN_SIGNUP=true
      - DEFAULT_USER_ROLE=user
      - DEFAULT_MODELS=${OLLAMA_MODEL:-snflwr.ai}
      # Lock down student accounts - chat only
      - USER_PERMISSIONS_CHAT_CONTROLS=false
      - USER_PERMISSIONS_CHAT_VALVES=false
      - USER_PERMISSIONS_CHAT_SYSTEM_PROMPT=false
      - USER_PERMISSIONS_CHAT_PARAMS=false
      - USER_PERMISSIONS_CHAT_FILE_UPLOAD=false
      - USER_PERMISSIONS_CHAT_DELETE=false
      - USER_PERMISSIONS_WORKSPACE_MODELS_ACCESS=false
      - USER_PERMISSIONS_WORKSPACE_KNOWLEDGE_ACCESS=false
      - USER_PERMISSIONS_WORKSPACE_PROMPTS_ACCESS=false
      - USER_PERMISSIONS_WORKSPACE_TOOLS_ACCESS=false
      - USER_PERMISSIONS_FEATURES_WEB_SEARCH=true
      - USER_PERMISSIONS_FEATURES_IMAGE_GENERATION=false
      - USER_PERMISSIONS_FEATURES_CODE_INTERPRETER=true
      - USER_PERMISSIONS_FEATURES_NOTES=false
      - USER_PERMISSIONS_FEATURES_CHANNELS=false
      - USER_PERMISSIONS_FEATURES_API_KEYS=false
      - USER_PERMISSIONS_FEATURES_MEMORIES=false
      - USER_PERMISSIONS_CHAT_SHARE=false
      - USER_PERMISSIONS_CHAT_EXPORT=false
      - USER_PERMISSIONS_CHAT_MULTIPLE_MODELS=false
      - USER_PERMISSIONS_CHAT_TEMPORARY=false
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_EVALUATION_ARENA_MODELS=false
      - ENABLE_TITLE_GENERATION=true
      - ENABLE_FOLLOW_UP_GENERATION=true
      - ENABLE_TAGS_GENERATION=true
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      - SHOW_ADMIN_DETAILS=false
    depends_on:
      snflwr-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - snflwr-home-net

  # Backup cron sidecar — the home stack runs no Celery Beat, so without this
  # the backup tooling never runs automatically (the enterprise stack schedules
  # it via celery-beat). Reuses the snflwr-api image (it has the script, deps
  # and the shared data volume); a plain sleep-until-hour loop avoids needing a
  # cron daemon OR the docker socket. Runs `backup_database.py backup` daily at
  # BACKUP_HOUR (default 03:00 local). Backups land in /app/data/backups (inside
  # the persisted snflwr-home-data volume); set OFFHOST_BACKUP_ENABLED + rclone
  # env in .env.home to also push them off-host (fail-closed).
  backup-cron:
    image: snflwr-api:latest
    container_name: snflwr-backup-cron
    working_dir: /app
    # Same entrypoint as the API image: fixes volume ownership, drops to the
    # non-root snflwr user, then execs this command.
    command:
      - /bin/sh
      - -c
      - |
        echo "[backup-cron] started; daily backup at ${BACKUP_HOUR:-03}:00"
        # Liveness heartbeat for the healthcheck below — touched every loop
        # iteration so a wedged loop goes stale (the inherited API image's
        # HTTP healthcheck does not apply to this sleep-loop sidecar).
        touch /tmp/backup-cron.alive
        while true; do
          touch /tmp/backup-cron.alive
          now=$$(date +%s)
          target=$$(date -d "${BACKUP_HOUR:-03}:00 today" +%s)
          [ "$$target" -le "$$now" ] && target=$$(date -d "${BACKUP_HOUR:-03}:00 tomorrow" +%s)
          sleep_for=$$((target - now))
          echo "[backup-cron] next backup in $${sleep_for}s"
          sleep "$$sleep_for"
          touch /tmp/backup-cron.alive
          echo "[backup-cron] running backup at $$(date -u +%FT%TZ)"
          python /app/scripts/backup_database.py backup \
            || echo "[backup-cron] backup FAILED (exit $$?) — see logs / heartbeat"
        done
    volumes:
      - snflwr-home-data:/app/data
      - snflwr-home-logs:/app/logs
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_TYPE=sqlite
      - SNFLWR_DATA_DIR=/app/data
      - LOG_PATH=/app/logs
      - DB_ENCRYPTION_ENABLED=${DB_ENCRYPTION_ENABLED:-true}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      # Backup behaviour (all optional; sane defaults). Set BACKUP_ENABLED=false
      # to keep the sidecar idle without removing it.
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_HOUR=${BACKUP_HOUR:-03}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      # Off-host (opt-in, fail-closed) — configure rclone in .env.home to enable.
      - OFFHOST_BACKUP_ENABLED=${OFFHOST_BACKUP_ENABLED:-false}
      - RCLONE_REMOTE=${RCLONE_REMOTE:-}
      - RCLONE_CONFIG=${RCLONE_CONFIG:-}
      - BACKUP_HEARTBEAT_URL=${BACKUP_HEARTBEAT_URL:-}
    depends_on:
      snflwr-api:
        condition: service_healthy
    # Override the API image's HTTP healthcheck (this sidecar serves no HTTP).
    # Healthy = the loop touched its heartbeat within the last ~26h (it touches
    # at least once per daily iteration); a wedged loop goes stale and unhealthy.
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/backup-cron.alive -mmin -1560 | grep -q . || exit 1"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - snflwr-home-net

volumes:
  ollama-data:
    driver: local
  open-webui-data:
    driver: local
  snflwr-home-data:
    driver: local
  snflwr-home-logs:
    driver: local

networks:
  snflwr-home-net:
    driver: bridge
