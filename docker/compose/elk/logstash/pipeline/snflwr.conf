# Logstash pipeline for snflwr.ai structured JSON logs
#
# Input:  JSON log files written by the API server under /logs/
# Filter: Parses JSON, extracts severity, adds timestamps
# Output: Ships to Elasticsearch

input {
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  # Snflwr logs are already structured JSON via utils/logger.py
  if [level] {
    mutate { rename => { "level" => "log_level" } }
  }
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "snflwr-logs-%{+YYYY.MM.dd}"
  }
}
