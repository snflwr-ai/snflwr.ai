# snflwr.ai Production Load Balancer Configuration (Docker Compose)
# nginx version 1.24+ recommended

# Worker processes — auto-detect CPU cores
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Hide Nginx version in response headers
    server_tokens off;

    # Strip backend server identity headers
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Include MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Upstream API server (single Docker service, keep least_conn for easy scaling)
    upstream snflwr_api {
        least_conn;
        server snflwr-api:8000;
        keepalive 32;
    }

    # Upstream Open WebUI frontend
    upstream open_webui {
        server open-webui:8080;
        keepalive 16;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=30r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Cache configuration
    proxy_cache_path /var/cache/nginx/snflwr levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name snflwr.example.com;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server - main application
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name snflwr.example.com;

        # SSL configuration (Docker Compose mounted certs)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # SSL protocols and ciphers (Mozilla Intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # SSL session configuration
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Connection limits
        limit_conn addr 10;

        # Request body size limits
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # Timeouts
        client_header_timeout 30s;
        client_body_timeout 30s;
        send_timeout 30s;
        keepalive_timeout 65s;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1000;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
        gzip_disable "msie6";

        # Access and error logs
        access_log /var/log/nginx/snflwr_access.log combined;
        error_log /var/log/nginx/snflwr_error.log warn;

        # -------------------------------------------------------
        # Snflwr API routes (proxied to snflwr-api backend)
        # -------------------------------------------------------

        # Health check endpoint (no rate limiting)
        location /health {
            proxy_pass http://snflwr_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Authentication endpoints (strict rate limiting)
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://snflwr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Disable caching for auth endpoints
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Chat endpoints (moderate rate limiting)
        location /child/chat {
            limit_req zone=chat_limit burst=10 nodelay;

            proxy_pass http://snflwr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Extended timeout for AI responses
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Disable caching for interactive chat
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # API endpoints (general rate limiting)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://snflwr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Short cache for read-only endpoints
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Parent dashboard (general rate limiting)
        location /parent/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://snflwr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Cache GET requests briefly
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 2m;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # OpenAPI documentation
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://snflwr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache documentation
            proxy_cache api_cache;
            proxy_cache_valid 200 1h;
        }

        # -------------------------------------------------------
        # Open WebUI frontend (default route)
        # -------------------------------------------------------

        # All other requests go to Open WebUI
        location / {
            proxy_pass http://open_webui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Open WebUI
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Extended timeouts for WebSocket connections
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # -------------------------------------------------------
        # Block common attack patterns
        # -------------------------------------------------------

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
