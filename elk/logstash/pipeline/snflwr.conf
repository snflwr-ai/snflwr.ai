# Logstash Pipeline for snflwr.ai
# Processes application logs and sends to Elasticsearch

input {
  # File input for application logs
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    tags => ["snflwr", "application"]
  }

  # TCP input for real-time log streaming
  tcp {
    port => 5000
    codec => json_lines
    tags => ["snflwr", "tcp"]
  }

  # Beats input (from Filebeat)
  beats {
    port => 5044
    tags => ["snflwr", "filebeat"]
  }
}

filter {
  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }

  # Extract log level
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # Add metadata
  mutate {
    add_field => {
      "application" => "snflwr-ai"
      "environment" => "${ENVIRONMENT:development}"
    }
  }

  # Parse safety incidents
  if [event_type] == "safety_incident" {
    mutate {
      add_tag => ["safety", "incident"]
    }
  }

  # Parse errors
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate {
      add_tag => ["error"]
    }
  }

  # Parse performance metrics
  if [event_type] == "performance" {
    mutate {
      add_tag => ["performance", "metrics"]
    }
  }

  # Grok pattern for unstructured logs (fallback)
  if ![message] {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} - %{LOGLEVEL:level} - %{GREEDYDATA:log_message}" }
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "snflwr-ai-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug output (optional, comment out in production)
  # stdout {
  #   codec => rubydebug
  # }
}
