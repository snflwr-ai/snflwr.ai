[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
no_strict_optional = True

# Check the bodies of untyped functions too. The project is gradually typed;
# this keeps the whole tree (api/core/safety/storage/utils) honestly checked
# rather than only the handful of fully-annotated defs.
check_untyped_defs = True

# Allow dynamic attributes (SystemConfig uses __getattr__; mixins reference
# attributes defined on the concrete class).
disable_error_code = attr-defined

# Platform-specific imports
[mypy-ctypes.*]
ignore_errors = True
