# Nginx load balancer for Ollama cluster
# Routes /api/* requests across multiple Ollama instances

events {
    worker_connections 1024;
}

http {
    upstream ollama_cluster {
        # Round-robin across Ollama instances. max_fails/fail_timeout passively
        # eject a replica that errors, so a dead pod stops receiving its 1/N share
        # (without these, a crashed replica still gets round-robined traffic).
        server ollama-1:11434 max_fails=2 fail_timeout=15s;
        server ollama-2:11434 max_fails=2 fail_timeout=15s;
        server ollama-3:11434 max_fails=2 fail_timeout=15s;
    }

    server {
        listen 11434;

        location / {
            proxy_pass http://ollama_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Active failover: a request that hits a down/erroring replica is
            # retried on the next one instead of failing the client.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            # Streaming support for /api/generate and /api/chat
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Health check endpoint
        location /api/tags {
            proxy_pass http://ollama_cluster;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}
